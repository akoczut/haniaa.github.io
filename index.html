<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urodziny Hani 🎀</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #1a1a1a, #ff66b2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    color: white;
}

.container {
    text-align: center;
}

h1 {
    font-size: 40px;
    margin-bottom: 40px;
    letter-spacing: 2px;
}

.gift-box {
    width: 200px;
    height: 200px;
    background: #ff4da6;
    position: relative;
    margin: 0 auto;
    cursor: pointer;
    border-radius: 15px;
    box-shadow: 0 0 30px #ff99cc;
    transition: transform 0.6s ease;
}

.lid {
    width: 200px;
    height: 60px;
    background: #ff1a8c;
    position: absolute;
    top: -60px;
    left: 0;
    border-radius: 15px 15px 0 0;
    transition: transform 0.6s ease;
}

.ribbon-vertical {
    width: 30px;
    height: 200px;
    background: black;
    position: absolute;
    left: 85px;
}

.ribbon-horizontal {
    width: 200px;
    height: 30px;
    background: black;
    position: absolute;
    top: 85px;
}

.message {
    margin-top: 40px;
    font-size: 32px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 1s ease;
    color: #ffe6f2;
    text-shadow: 0 0 15px #ff66cc;
}

.open .lid {
    transform: translateY(-80px) rotate(-15deg);
}

.open .message {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="container">
    <h1>Dla Hani 🎀✨</h1>

    <div class="gift-box" onclick="openGift(this)">
        <div class="lid"></div>
        <div class="ribbon-vertical"></div>
        <div class="ribbon-horizontal"></div>
    </div>

    <div class="message">
        🎉 Wszystkiego najlepszego Hania! 🎂💖<br>
        Dużo miłości, szczęścia i spełnienia marzeń ✨
    </div>
</div>

<script>
function openGift(box) {
    box.classList.toggle("open");
}
</script>

</body>
</html>
